name: Weekly Supermarket Specials

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Run checker
        run: node supermarket_checker.js
        continue-on-error: true
      
      - name: Commit results
        run: |
          git config user.name "Bot"
          git config user.email "bot@example.com"
          git add supermarket_specials.html || true
          git commit -m "Update specials" || true
          git push || true
