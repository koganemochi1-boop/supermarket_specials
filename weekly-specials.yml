name: Weekly Supermarket Specials

on:
  schedule:
    # Run every Monday at 8 AM UTC (10 PM Sunday Hawaii time)
    - cron: '0 8 * * 1'
  
  # Also allow manual triggering from GitHub UI
  workflow_dispatch:

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Run supermarket specials checker
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node supermarket_checker.js
      
      - name: Commit and push results
        run: |
          git config user.name "Specials Bot"
          git config user.email "bot@example.com"
          git add supermarket_specials.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update supermarket specials - $(date)" && git push)
